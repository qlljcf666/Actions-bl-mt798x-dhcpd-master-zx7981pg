# 替换原分区表修改的sed命令，新逻辑如下
- name: 适配ZX7981PG硬件配置
  working-directory: bl-mt798x-dhcpd
  run: |
    # 1. 复制并修改defconfig（保留原有功能启用逻辑，仅补充硬件适配）
    cp configs/mt7981_defconfig configs/zx7981pg_defconfig
    cat >> configs/zx7981pg_defconfig << EOF
    CONFIG_MTK_DHCPD=y
    CONFIG_MTK_DHCPD_ENHANCED=y
    CONFIG_MTK_DHCPD_USE_CONFIG_IP=y
    CONFIG_MTK_DHCPD_POOL_START_HOST=100
    CONFIG_MTK_DHCPD_POOL_SIZE=101

    # Failsafe Web UI功能
    CONFIG_WEBUI_FAILSAFE_UI_NEW=y
    CONFIG_WEBUI_FAILSAFE_I18N=y
    CONFIG_WEBUI_FAILSAFE_UI_GL=y
    CONFIG_WEBUI_FAILSAFE_UI_MTK=y
    CONFIG_WEBUI_FAILSAFE_ADVANCED=y
    CONFIG_WEBUI_FAILSAFE_SIMG=y
    CONFIG_WEBUI_FAILSAFE_FACTORY=y
    CONFIG_WEBUI_FAILSAFE_BACKUP=y
    CONFIG_WEBUI_FAILSAFE_ENV=y
    CONFIG_WEBUI_FAILSAFE_CONSOLE=y
    CONFIG_WEBUI_FAILSAFE_FLASH=y

    # 适配SPI NAND和ZX7981PG硬件
    CONFIG_SPI_NAND=y
    CONFIG_MTD_DEVICE=y
    CONFIG_MTD_PARTITIONS=y
    CONFIG_MTD_CMDLINE_PARTS=y
    CONFIG_MTD_UBI=y
    CONFIG_MTD_UBI_WL_THRESHOLD=4096
    CONFIG_MTD_UBI_BEB_LIMIT=20
    EOF

    # 2. 修改uboot源码中的分区表（匹配实际SPI NAND分区）
    # 定位MT7981的分区定义文件（不同源码路径需调整，示例路径）
    PARTITION_FILE="board/mediatek/mt7981/mt7981.c"
    # 清空原有分区表，替换为ZX7981PG实际分区
    sed -i '/static const struct part_info .*partitions\[\]/,/};/c \
    static const struct part_info zx7981pg_partitions[] = { \
        { "bl2",        0x000000, 0x100000 },  /* 1MB: BootLoader 2 */ \
        { "u-boot-env", 0x100000, 0x080000 },  /* 512KB: U-Boot环境变量 */ \
        { "Factory",    0x180000, 0x200000 },  /* 2MB: 工厂配置（RF/MAC等） */ \
        { "fip",        0x380000, 0x200000 },  /* 2MB: FIP固件（ATF/UBOOT等） */ \
        { "woem",       0x580000, 0x0a0000 },  /* 640KB: 厂商配置 */ \
        { "ubi",        0x620000, 0x7000000 }, /* 112MB: UBI分区（多系统固件） */ \
        { "wtinfo",     0x7620000,0x060000 },  /* 384KB: 设备信息 */ \
        { "nvram",      0x7680000,0x060000 },  /* 384KB: NVRAM配置 */ \
    };' $PARTITION_FILE

    # 3. 修改DTB文件中的分区表（若源码包含ZX7981PG的dts，需同步）
    # 定位ZX7981PG的DTS文件（示例路径）
    DTS_FILE="arch/arm/dts/mt7981-zx7981pg.dts"
    # 若DTS文件不存在，基于mt7981.dts复制创建
    if [ ! -f "$DTS_FILE" ]; then
        cp arch/arm/dts/mt7981.dts "$DTS_FILE"
        # 追加SPI NAND分区表到DTS
        cat >> "$DTS_FILE" << EOF
    &spi0 {
        status = "okay";
        spi_nand@0 {
            compatible = "spi-nand";
            reg = <0>;
            spi-max-frequency = <52000000>;

            partitions {
                compatible = "fixed-partitions";
                #address-cells = <1>;
                #size-cells = <1>;

                partition@0 {
                    label = "bl2";
                    reg = <0x0 0x100000>;
                };
                partition@100000 {
                    label = "u-boot-env";
                    reg = <0x100000 0x80000>;
                };
                partition@180000 {
                    label = "Factory";
                    reg = <0x180000 0x200000>;
                    read-only;
                };
                partition@380000 {
                    label = "fip";
                    reg = <0x380000 0x200000>;
                };
                partition@580000 {
                    label = "woem";
                    reg = <0x580000 0xa0000>;
                    read-only;
                };
                partition@620000 {
                    label = "ubi";
                    reg = <0x620000 0x7000000>;
                    compatible = "linux,ubi";
                };
                partition@7620000 {
                    label = "wtinfo";
                    reg = <0x7620000 0x60000>;
                    read-only;
                };
                partition@7680000 {
                    label = "nvram";
                    reg = <0x7680000 0x60000>;
                    read-only;
                };
            };
        };
    };
    EOF
    fi

    # 4. 优化多系统兼容逻辑（适配UBI分区）
    COMPAT_FILE="common/main.c"
    # 替换原有多系统启动函数，适配UBI分区
    sed -i '/zx7981pg_multi_system_boot/d' $COMPAT_FILE
    cat >> $COMPAT_FILE << EOF
    #ifdef CONFIG_ZX7981PG
    // ZX7981PG多系统启动（适配UBI分区）
    static int zx7981pg_multi_system_boot(void) {
        // UBI分区挂载（适配qwrt/openwrt/immwrt/istore/xwrt）
        system("ubiattach -m 5 -d 0 /dev/mtd5"); // 对应ubi分区（mtd5=0x620000）
        system("mount -t ubifs ubi0:rootfs /mnt/rootfs");
        
        // 检查各系统标记文件，优先启动
        char *systems[] = { "qwrt", "openwrt", "immwrt", "istore", "xwrt" };
        for (int i=0; i<sizeof(systems)/sizeof(char*); i++) {
            if (access("/mnt/rootfs/.system_" systems[i], F_OK) == 0) {
                run_command("bootm /mnt/rootfs/kernel", 0);
                return 0;
            }
        }
        // 默认启动UBI分区的默认内核
        run_command("bootm /dev/mtd5:kernel", 0);
        return 0;
    }
    #endif
    EOF
    # 确保main_loop中调用该函数
    sed -i '/main_loop() {/a \    #ifdef CONFIG_ZX7981PG\n    zx7981pg_multi_system_boot();\n    #endif' $COMPAT_FILE
