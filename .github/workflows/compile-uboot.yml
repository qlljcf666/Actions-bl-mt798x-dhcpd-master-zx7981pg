name: Compile ZX7981PG U-Boot

on:
  push:
分支: [ main ]
    paths:
      - 'configs/mt7981_zx7981pg_defconfig'
      - 'u-boot/arch/arm/dts/mt7981-zx7981pg.dts'
      - '.github/workflows/compile-uboot.yml'
  pull_request:
分支: [ main ]
  workflow_dispatch:

jobs:
  compile:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential gcc-arm-linux-gnueabii gcc-aarch64-linux-gnu \
          binutils-arm-linux-gnueabihf bison flex git wget libssl-dev python3 python3-pip \
          device-tree-compiler u-boot-tools

      - name: Set up cross compiler
        run: |
          mkdir -p ~/toolchain
          wget https://developer.arm.com/-/media/Files/downloads/gnu-a/10.3-2021.07/binrel/gcc-arm-10.3-2021.07-x86_64-aarch64-none-linux-gnu.tar.xz
          tar xf gcc-arm-10.3-2021.07-x86_64-aarch64-none-linux-gnu.tar.xz -C ~/toolchain
          echo "PATH=$HOME/toolchain/gcc-arm-10.3-2021.07-x86_64-aarch64-none-linux-gnu/bin:$PATH" >> $GITHUB_ENV

      - name: Compile U-Boot
        run: |
          cd u-boot
          make mt7981_zx7981pg_defconfig
          make -j$(nproc) CROSS_COMPILE=aarch64-none-linux-gnu-

      - name: Package artifacts
        run: |
          mkdir -p output
          cp u-boot/u-boot.bin output/u-boot-zx7981pg.bin
          cp u-boot/u-boot-nodtb.bin output/
          cp u-boot/mt7981-zx7981pg.dtb output/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: u-boot-zx7981pg
          path: output/
